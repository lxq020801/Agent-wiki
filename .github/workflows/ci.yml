name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    env:
      AGENT_WIKI_HOME: ${{ runner.temp }}/agent-wiki-ci
      PIP_DISABLE_PIP_VERSION_CHECK: "1"
      PYTHONPYCACHEPREFIX: ${{ runner.temp }}/pycache

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            requirements.txt
            deps/douyin/requirements.txt

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Python dependencies
        run: python -m pip install -r requirements.txt -r deps/douyin/requirements.txt

      - name: Compile Python entry points
        run: >-
          python -m py_compile
          deps/douyin/scripts/analyzer.py
          deps/douyin/scripts/config_loader.py
          deps/douyin/scripts/ingest.py
          server/websocket_server.py
          install/bootstrap.py
          tests/test_ci_integration.py

      - name: Run P0 static checks
        env:
          ALL_PROXY: http://127.0.0.1:9
          HTTP_PROXY: http://127.0.0.1:9
          HTTPS_PROXY: http://127.0.0.1:9
          NO_PROXY: 127.0.0.1,localhost
        run: python tests/test_p0_static.py

      - name: Run Douyin image-post checks
        env:
          ALL_PROXY: http://127.0.0.1:9
          HTTP_PROXY: http://127.0.0.1:9
          HTTPS_PROXY: http://127.0.0.1:9
          NO_PROXY: 127.0.0.1,localhost
        run: python tests/test_douyin_image_post_static.py

      - name: Run isolated integration checks
        env:
          ALL_PROXY: http://127.0.0.1:9
          HTTP_PROXY: http://127.0.0.1:9
          HTTPS_PROXY: http://127.0.0.1:9
          NO_PROXY: 127.0.0.1,localhost
        run: python tests/test_ci_integration.py

      - name: Check Chrome extension JavaScript
        run: |
          node --check chrome-extension/background.js
          node --check chrome-extension/popup/popup.js
          node --check chrome-extension/content/douyin-current-video.js

      - name: Run extension message contract checks
        run: node tests/test_extension_contract.js
